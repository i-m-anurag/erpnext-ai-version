# ============================================================================
# Sample config for YOUR external (host) Nginx — manual TLS certs.
# Proxies HTTPS -> app container (web 127.0.0.1:8080, socketio 127.0.0.1:9000).
#
# Ubuntu:  place in /etc/nginx/sites-available/ and symlink to sites-enabled/
# CentOS:  place in /etc/nginx/conf.d/erpnext.conf
# ============================================================================

# Redirect HTTP -> HTTPS
server {
    listen 80;
    server_name erp.yourdomain.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    http2 on;
    server_name erp.yourdomain.com;

    # --- Your manually-managed certificates ---
    ssl_certificate     /etc/ssl/erp/fullchain.pem;
    ssl_certificate_key /etc/ssl/erp/privkey.pem;

    # Allow large file uploads (PO scans, attachments)
    client_max_body_size 50m;

    # WebSocket / realtime
    location /socket.io {
        proxy_pass http://127.0.0.1:9000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Main app
    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }
}
